services:
  core:
    build:
      context: .
      dockerfile: core/Dockerfile
    restart: unless-stopped
    ports:
      - "${ANX_CORE_PORT:-8000}:8000"
    volumes:
      - "${HOST_ANX_WORKSPACE_ROOT:-anx-workspace}:/var/lib/anx/workspace"
    environment:
      ANX_LISTEN_ADDR: "0.0.0.0:8000"
      ANX_CORS_ALLOWED_ORIGINS: "${ANX_CORS_ALLOWED_ORIGINS:-}"
      ANX_WEBAUTHN_RPID: "${ANX_WEBAUTHN_RPID:-}"
      ANX_WEBAUTHN_ORIGIN: "${ANX_WEBAUTHN_ORIGIN:-}"
      ANX_WEBAUTHN_RP_DISPLAY_NAME: "${ANX_WEBAUTHN_RP_DISPLAY_NAME:-ANX}"
      ANX_CORE_INSTANCE_ID: "${ANX_CORE_INSTANCE_ID:-core-local}"
      ANX_BOOTSTRAP_TOKEN: "${ANX_BOOTSTRAP_TOKEN:-}"
      ANX_SHUTDOWN_TIMEOUT: "${ANX_SHUTDOWN_TIMEOUT:-15s}"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:8000/health"]
      interval: 15s
      timeout: 5s
      start_period: 5s
      retries: 3

  web-ui:
    build:
      context: .
      dockerfile: web-ui/Dockerfile
    restart: unless-stopped
    ports:
      - "${ANX_WEB_UI_PORT:-3000}:3000"
    environment:
      PORT: "3000"
      ORIGIN: "${ANX_WEB_UI_ORIGIN:-http://localhost:3000}"
      ANX_CORE_BASE_URL: "http://core:8000"
    depends_on:
      core:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 15s
      timeout: 5s
      start_period: 10s
      retries: 3

volumes:
  anx-workspace:
