          type: string
          format: date-time
        if_base_revision:
          type: string
          description: >
            Optional base revision id for optimistic concurrency (must match the document head
            when appending from the current tip). When omitted with the nested `revision` envelope,
            the server defaults to the document head revision.
      required: [revision]

    CreateBoardRequest:
      type: object
      properties:
        board: { $ref: '#/components/schemas/BoardCreateInput' }
      required: [board]

    PatchBoardRequest:
      type: object
      properties:
        patch: { $ref: '#/components/schemas/BoardPatchInput' }
        if_updated_at:
          type: string
          format: date-time
      required: [patch, if_updated_at]

    CreateCardRequest:
      type: object
      properties:
        board_id:
          type: string
          description: >
            Target board for POST /cards. Required unless board_ref is set. Ignored for
            POST /boards/{board_id}/cards (path segment is authoritative).
        board_ref:
          allOf:
            - $ref: '#/components/schemas/TypedRef'
          description: Alternative to board_id; MUST be board:<board_id> for POST /cards.
        card: { $ref: '#/components/schemas/CardCreateInput' }
        if_board_updated_at:
          type: string
          format: date-time
      required: [card]

    BatchCreateBoardCardsRequest:
      type: object
      properties:
        actor_id: { type: string }
        request_key: { type: string }
        if_board_updated_at:
          type: string
          format: date-time
        items:
          type: array
          minItems: 1
          maxItems: 100
          items:
            $ref: '#/components/schemas/BoardCardBatchItemInput'
      required: [items]

    BoardCardBatchItemInput:
      type: object
      description: >
        One card to create; same field conventions as POST /boards/{board_id}/cards for a single
        card (flat fields and optional nested `card`). Do not send actor_id, request_key,
        if_board_updated_at, board_id, or board_ref on each item — use the batch envelope.
      additionalProperties: true
      properties:
        card: { $ref: '#/components/schemas/CardCreateInput' }
        card_id: { type: string }
        id: { type: string }
        title: { type: string }
        summary: { type: string }
        column_key:
          type: string
          enum: [backlog, ready, in_progress, blocked, review, done]
        before_card_id: { type: string }
        after_card_id: { type: string }
        before_thread_id: { type: string }
        after_thread_id: { type: string }
        parent_thread: { type: string }
        thread_id: { type: string }
        assignee_refs:
          type: array
          items: { $ref: '#/components/schemas/TypedRef' }
        risk:
          type: string
          enum: [low, medium, high, critical]
        resolution:
          type: string
          nullable: true
          enum: [done, canceled]
        resolution_refs:
          type: array
          items: { $ref: '#/components/schemas/TypedRef' }
        related_refs:
          type: array
          items: { $ref: '#/components/schemas/TypedRef' }
        topic_ref: { $ref: '#/components/schemas/TypedRef' }
        document_ref: { $ref: '#/components/schemas/TypedRef' }
        due_at:
          type: string
          format: date-time
          nullable: true
        definition_of_done:
          type: array
          items: { type: string }
        provenance: { $ref: '#/components/schemas/Provenance' }
      required: [title]

    BatchCreateBoardCardsResponse:
      type: object
      properties:
        board: { $ref: '#/components/schemas/Board' }
        cards:
          type: array
          items: { $ref: '#/components/schemas/Card' }
      required: [board, cards]

    PatchCardRequest:
      type: object
      properties:
        patch: { $ref: '#/components/schemas/CardPatchInput' }
        if_updated_at:
          type: string
          format: date-time
      required: [patch, if_updated_at]

    MoveCardRequest:
      description: >
        Flat card move body aligned with refactor spec §8.1 (`column_key`, optional placement
        hints, optional terminal resolution). Clients MAY also send a legacy nested
        `move` object with the same fields; core flattens it when `column_key` is not set at the root.
      allOf:
        - $ref: '#/components/schemas/MoveCardInput'
        - type: object
          properties:
            actor_id:
              type: string
              description: Optional actor performing the move (may also be supplied via auth headers).
            move:
              $ref: '#/components/schemas/MoveCardInput'
              deprecated: true
              description: Legacy envelope; prefer flat top-level fields. Ignored when `column_key` is set at the root.

    CreateReceiptRequest:
      type: object
      description: >
        Artifact envelope plus structured packet. Core requires both `artifact` and `packet`;
        `artifact.kind` defaults to `receipt` when omitted.
      properties:
        actor_id: { type: string }
        request_key: { type: string }
        artifact:
          type: object
          additionalProperties: true
          description: Artifact fields before persistence (kind, id, refs, summary, provenance, …).
        packet: { $ref: '#/components/schemas/ReceiptPacket' }
      required: [artifact, packet]

    CreateReviewRequest:
      type: object
      description: >
        Artifact envelope plus structured packet. Core requires both `artifact` and `packet`;
        `artifact.kind` defaults to `review` when omitted.
      properties:
        actor_id: { type: string }
        request_key: { type: string }
        artifact:
          type: object
          additionalProperties: true
          description: Artifact fields before persistence (kind, id, refs, summary, provenance, …).
        packet: { $ref: '#/components/schemas/ReviewPacket' }
      required: [artifact, packet]

