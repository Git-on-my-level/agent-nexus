          allOf:
            - $ref: '#/components/schemas/TypedRef'
          description: MUST be card:<card_id>.
        receipt_ref: { $ref: '#/components/schemas/TypedRef' }
        outcome:
          type: string
          enum: [accept, revise, escalate]
        notes: { type: string }
        evidence_refs:
          type: array
          items: { $ref: '#/components/schemas/TypedRef' }
      required: [review_id, subject_ref, receipt_ref, outcome, notes, evidence_refs]

    EventCreateInput:
      type: object
      properties:
        type: { type: string }
        actor_id: { type: string }
        thread_ref: { $ref: '#/components/schemas/TypedRef' }
        refs:
          type: array
          items: { $ref: '#/components/schemas/TypedRef' }
        summary: { type: string }
