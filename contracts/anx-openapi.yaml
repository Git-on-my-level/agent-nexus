          type: array
          items: { $ref: '#/components/schemas/TypedRef' }
        related_refs:
          type: array
          items: { $ref: '#/components/schemas/TypedRef' }
        due_at:
          type: string
          format: date-time
          nullable: true
        definition_of_done:
          type: array
          items: { type: string }
        provenance: { $ref: '#/components/schemas/Provenance' }
      required:
        [title, summary, column_key, assignee_refs, risk, resolution_refs, related_refs, provenance]

    CardPatchInput:
