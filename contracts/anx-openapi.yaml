        projection_freshness: { $ref: '#/components/schemas/ProjectionFreshness' }
        section_kinds:
          type: array
          items: { type: string }
        generated_at: { type: string, format: date-time }
      required:
        [board, cards, documents, inbox, board_summary, projection_freshness, section_kinds, generated_at]

    CardResponse:
      type: object
      properties:
        card: { $ref: '#/components/schemas/Card' }
      required: [card]

    CardsResponse:
      type: object
      properties:
        cards:
          type: array
          items: { $ref: '#/components/schemas/Card' }
      required: [cards]

    BoardCardMutationResponse:
      type: object
      properties:
        board: { $ref: '#/components/schemas/Board' }
        card: { $ref: '#/components/schemas/Card' }
      required: [board, card]

    RestoreArchivedCardRequest:
      type: object
      properties:
        actor_id: { type: string }
        if_board_updated_at:
          type: string
          format: date-time

    CardTrashRequest:
      type: object
      properties:
        actor_id: { type: string }
        reason: { type: string }
        if_board_updated_at:
          type: string
          format: date-time
      required: [reason]

    PurgeCardRequest:
      type: object
      properties:
        actor_id: { type: string }

    PurgeCardResponse:
      type: object
      properties:
        purged: { type: boolean }
        card_id: { type: string }
      required: [purged, card_id]

    PacketPayload:
      oneOf:
        - $ref: '#/components/schemas/ReceiptPacket'
        - $ref: '#/components/schemas/ReviewPacket'

    PacketArtifactResponse:
      type: object
      properties:
        artifact: { $ref: '#/components/schemas/Artifact' }
        packet_kind: { type: string }
        packet: { $ref: '#/components/schemas/PacketPayload' }
      required: [artifact, packet_kind, packet]

    EventResponse:
      type: object
      properties:
        event: { $ref: '#/components/schemas/Event' }
      required: [event]

    EventsResponse:
      type: object
      properties:
        events:
          type: array
          items: { $ref: '#/components/schemas/Event' }
      required: [events]

    ArtifactResponse:
      type: object
      properties:
        artifact: { $ref: '#/components/schemas/Artifact' }
      required: [artifact]

    InboxResponse:
      type: object
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/InboxItem' }
      required: [items]

    AcknowledgeInboxItemResponse:
      type: object
      properties:
        event: { $ref: '#/components/schemas/Event' }
      required: [event]

    ArtifactsListResponse:
      type: object
      properties:
        artifacts:
          type: array
          items: { $ref: '#/components/schemas/Artifact' }
      required: [artifacts]

    CreateArtifactRequest:
      type: object
      properties:
        actor_id: { type: string }
        artifact:
          type: object
          additionalProperties: true
          description: Artifact fields before persistence (e.g. kind, refs, summary).
        content: {}
        content_type: { type: string }
      required: [artifact, content_type]

    ThreadContextArtifactEntry:
      type: object
      description: Key artifact row; may include ref, artifact, and optional content_preview.
      additionalProperties: true

    ThreadContextResponse:
      type: object
      properties:
        thread: { $ref: '#/components/schemas/Thread' }
        recent_events:
          type: array
          items: { $ref: '#/components/schemas/Event' }
        key_artifacts:
          type: array
          items: { $ref: '#/components/schemas/ThreadContextArtifactEntry' }
        open_cards:
          type: array
          items: { type: object, additionalProperties: true }
        documents:
          type: array
          items: { type: object, additionalProperties: true }
      additionalProperties: true
      required: [thread, recent_events, key_artifacts, open_cards, documents]

    ArchiveCardRequest:
      type: object
      properties:
        actor_id: { type: string }
        if_board_updated_at:
          type: string
          format: date-time

    SecretMetadata:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        description: { type: string }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        created_by: { type: string }
        updated_by: { type: string }
      required: [id, name, created_at, updated_at, created_by, updated_by]

    CreateSecretRequest:
      type: object
      properties:
        name:
          type: string
          description: Unique secret name (e.g. OPENAI_API_KEY).
        value:
          type: string
          description: Secret plaintext value to encrypt.
        description:
          type: string
          description: Optional note about this secret's purpose.
      required: [name, value]

    UpdateSecretRequest:
      type: object
      properties:
        value:
          type: string
          description: New secret plaintext value.
        description:
          type: string
          description: Updated description (omit to keep current).
      required: [value]

    SecretResponse:
      type: object
      properties:
        secret: { $ref: '#/components/schemas/SecretMetadata' }
      required: [secret]

    SecretsResponse:
      type: object
      properties:
        secrets:
          type: array
          items: { $ref: '#/components/schemas/SecretMetadata' }
      required: [secrets]

    DeleteSecretResponse:
      type: object
      properties:
        deleted: { type: boolean }
        secret_id: { type: string }
      required: [deleted, secret_id]

    RevealSecretResponse:
      type: object
      properties:
        name: { type: string }
        value: { type: string }
      required: [name, value]

    RevealSecretsBatchRequest:
      type: object
      properties:
        names:
          type: array
          items: { type: string }
          description: List of secret names to reveal.
      required: [names]

    RevealSecretsBatchResponse:
      type: object
      properties:
        secrets:
          type: array
          items:
            type: object
            properties:
              name: { type: string }
              value: { type: string }
            required: [name, value]
      required: [secrets]
