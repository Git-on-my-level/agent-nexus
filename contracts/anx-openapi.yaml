        exist), `card:<card_id>`, `board:<board_id>`. Do not pass a thread id with the `topic:` prefix.
      properties:
        actor_id: { type: string }
        subject_ref: { $ref: '#/components/schemas/TypedRef' }
        inbox_item_id:
          type: string
          description: Must match path inbox_id when both are provided.
        note: { type: string }
        refs:
          type: array
          items: { $ref: '#/components/schemas/TypedRef' }
      required: [subject_ref]

