openapi: 3.1.0
info:
  title: Agent Nexus HTTP API
  version: 0.3.0
  description: |
    Canonical workspace HTTP contract for Agent Nexus.

    Topics and cards are the primary durable resources. Threads remain backing
    infrastructure surfaced through read-only inspection and workspace views.
servers:
  - url: http://127.0.0.1:8000
x-anx-extension-vocabulary:
  x-anx-command-id: Stable command identifier.
  x-anx-cli-path: CLI path segments.
  x-anx-why: Why the command exists.
  x-anx-input-mode: none | json-body | raw-stream | file-and-body
  x-anx-streaming: Streaming characteristics for the operation.
  x-anx-output-envelope: Output shape and stability notes.
  x-anx-error-codes: Stable semantic error codes.
  x-anx-concepts: Concept tags for generated docs and help.
  x-anx-stability: experimental | beta | stable
  x-anx-surface: canonical | projection | diagnostic | utility
  x-anx-agent-notes: Idempotency, retries, and protocol caveats.
paths:
  /health:
    get:
      operationId: healthCheck
      summary: Liveness check
      tags: [meta]
      x-anx-surface: utility
      x-anx-command-id: meta.health
      x-anx-cli-path: meta health
      x-anx-why: Probe whether the core process is alive.
      x-anx-input-mode: none
      x-anx-streaming: { mode: none }
      x-anx-output-envelope: "Returns `{ ok: true }`."
      x-anx-error-codes: []
      x-anx-concepts: [health]
      x-anx-stability: stable
      responses:
        '200':
          description: Service is alive
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /readyz:
    get:
      operationId: readinessCheck
      summary: Readiness check
      tags: [meta]
      x-anx-surface: utility
      x-anx-command-id: meta.readyz
      x-anx-cli-path: meta readyz
      x-anx-why: Verify storage and projection subsystems are ready for traffic.
      x-anx-input-mode: none
      x-anx-streaming: { mode: none }
      x-anx-output-envelope: "Returns `{ ok: true }` when the workspace is ready."
      x-anx-error-codes: [storage_unavailable]
      x-anx-concepts: [health, readiness]
      x-anx-stability: stable
      responses:
        '200':
          description: Service is ready
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        '503':
          $ref: '#/components/responses/ErrorResponse'

  /version:
    get:
      operationId: getVersion
      summary: Get contract version
      tags: [meta]
      x-anx-surface: utility
      x-anx-command-id: meta.version
      x-anx-cli-path: meta version
      x-anx-why: Check compatibility between clients and core before writes.
      x-anx-input-mode: none
      x-anx-streaming: { mode: none }
      x-anx-output-envelope: "Returns `{ schema_version, command_registry_digest }`."
      x-anx-error-codes: []
      x-anx-concepts: [compatibility]
      x-anx-stability: stable
      responses:
        '200':
          description: Version payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VersionResponse'

  /topics:
    get:
      operationId: listTopics
      summary: List topics
      tags: [topics]
      x-anx-surface: canonical
      x-anx-command-id: topics.list
      x-anx-cli-path: topics list
      x-anx-why: Scan the durable topic inventory.
      x-anx-input-mode: none
      x-anx-streaming: { mode: none }
      x-anx-output-envelope: "Returns `{ topics }`."
      x-anx-error-codes: [auth_required, invalid_token]
      x-anx-concepts: [topics]
      x-anx-stability: beta
      parameters:
        - name: type
          in: query
          required: false
          schema: { type: string }
          description: Filter by topic type enum.
        - name: status
          in: query
          required: false
          schema: { type: string }
          description: Filter by topic status enum.
        - name: q
          in: query
          required: false
          schema: { type: string }
          description: Search topics by id or title substring.
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 1000
          description: Page size; omit to return the full matching set.
        - name: cursor
          in: query
          required: false
          schema: { type: string }
          description: Opaque pagination cursor from a previous list response.
        - name: include_archived
          in: query
          required: false
          schema: { type: boolean, default: false }
        - name: archived_only
          in: query
          required: false
          schema: { type: boolean, default: false }
        - name: include_trashed
          in: query
          required: false
          schema: { type: boolean, default: false }
        - name: trashed_only
          in: query
          required: false
          schema: { type: boolean, default: false }
      responses:
        '200':
          description: Topic list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TopicsResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
    post:
      operationId: createTopic
      summary: Create topic
      tags: [topics]
      x-anx-surface: canonical
      x-anx-command-id: topics.create
      x-anx-cli-path: topics create
      x-anx-why: Create a first-class durable topic before attaching cards, docs, or packets.
      x-anx-input-mode: json-body
      x-anx-streaming: { mode: none }
      x-anx-output-envelope: "Returns `{ topic }`."
      x-anx-error-codes: [auth_required, invalid_request, invalid_token]
      x-anx-concepts: [topics, write]
      x-anx-stability: beta
      x-anx-agent-notes: "Replay-safe when the same request key and body are reused."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTopicRequest'
      responses:
        '201':
          description: Topic created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TopicResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'

  /topics/{topic_id}:
    get:
      operationId: getTopic
      summary: Get topic
      tags: [topics]
      x-anx-surface: canonical
      x-anx-command-id: topics.get
      x-anx-cli-path: topics get
      x-anx-why: Resolve one topic and its canonical durable fields.
      x-anx-input-mode: none
      x-anx-streaming: { mode: none }
      x-anx-output-envelope: "Returns `{ topic }`."
      x-anx-error-codes: [auth_required, invalid_token, not_found]
      x-anx-concepts: [topics]
      x-anx-stability: beta
      parameters:
        - $ref: '#/components/parameters/TopicID'
      responses:
        '200':
          description: Topic payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TopicResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'
    patch:
      operationId: patchTopic
      summary: Patch topic
      tags: [topics]
      x-anx-surface: canonical
      x-anx-command-id: topics.patch
      x-anx-cli-path: topics patch
      x-anx-why: Update topic state with provenance and optimistic concurrency.
      x-anx-input-mode: json-body
      x-anx-streaming: { mode: none }
      x-anx-output-envelope: "Returns `{ topic }`."
      x-anx-error-codes: [auth_required, invalid_request, invalid_token, not_found, conflict]
      x-anx-concepts: [topics, write, concurrency]
      x-anx-stability: beta
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchTopicRequest'
      parameters:
        - $ref: '#/components/parameters/TopicID'
      responses:
        '200':
          description: Topic patched
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TopicResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'
        '409':
          $ref: '#/components/responses/ErrorResponse'

  /topics/{topic_id}/timeline:
    get:
      operationId: getTopicTimeline
      summary: Get topic timeline
      tags: [topics]
      x-anx-surface: projection
      x-anx-command-id: topics.timeline
      x-anx-cli-path: topics timeline
      x-anx-why: Load chronological evidence and related resources for one topic.
      x-anx-input-mode: none
      x-anx-streaming: { mode: none }
      x-anx-output-envelope: "Returns `{ topic, events, artifacts, cards, documents, threads }`."
      x-anx-error-codes: [auth_required, invalid_token, not_found]
      x-anx-concepts: [topics, timeline]
      x-anx-stability: beta
      parameters:
        - $ref: '#/components/parameters/TopicID'
      responses:
        '200':
          description: Topic timeline payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TopicTimelineResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'

  /topics/{topic_id}/workspace:
    get:
      operationId: getTopicWorkspace
      summary: Get topic workspace (primary operator coordination read)
      tags: [topics]
      x-anx-surface: projection
      x-anx-command-id: topics.workspace
      x-anx-cli-path: topics workspace
      x-anx-why: Primary operator coordination read — load the topic workspace composed from linked cards, docs, backing threads, and inbox items. Prefer this over thread workspace for triage and planning.
      x-anx-input-mode: none
      x-anx-streaming: { mode: none }
      x-anx-output-envelope: "Returns `{ topic, cards, boards, documents, threads, inbox, projection_freshness, generated_at }`."
      x-anx-error-codes: [auth_required, invalid_token, not_found]
      x-anx-concepts: [topics, workspace]
      x-anx-stability: beta
      parameters:
        - $ref: '#/components/parameters/TopicID'
      responses:
        '200':
          description: Topic workspace payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TopicWorkspaceResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'

  /topics/{topic_id}/archive:
    post:
      operationId: archiveTopic
      summary: Archive topic
      tags: [topics]
      x-anx-surface: canonical
      x-anx-command-id: topics.archive
      x-anx-cli-path: topics archive
      x-anx-why: Soft-archive a topic (orthogonal to business status; clears default list visibility).
      x-anx-input-mode: json-body
      x-anx-streaming: { mode: none }
      x-anx-output-envelope: "Returns `{ topic }`."
      x-anx-error-codes: [auth_required, invalid_request, invalid_token, not_found, conflict]
      x-anx-concepts: [topics, write]
      x-anx-stability: beta
      parameters:
        - $ref: '#/components/parameters/TopicID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TopicLifecycleMutationRequest'
      responses:
        '200':
          description: Topic archived
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TopicResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'
        '409':
          $ref: '#/components/responses/ErrorResponse'

  /topics/{topic_id}/unarchive:
    post:
      operationId: unarchiveTopic
      summary: Unarchive topic
      tags: [topics]
      x-anx-surface: canonical
      x-anx-command-id: topics.unarchive
      x-anx-cli-path: topics unarchive
      x-anx-why: Clear archived_at on a topic (restore default list visibility).
      x-anx-input-mode: json-body
      x-anx-streaming: { mode: none }
      x-anx-output-envelope: "Returns `{ topic }`."
      x-anx-error-codes: [auth_required, invalid_request, invalid_token, not_found, conflict]
      x-anx-concepts: [topics, write]
      x-anx-stability: beta
      parameters:
        - $ref: '#/components/parameters/TopicID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TopicLifecycleMutationRequest'
      responses:
        '200':
          description: Topic unarchived
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TopicResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'
        '409':
          $ref: '#/components/responses/ErrorResponse'

  /topics/{topic_id}/trash:
    post:
      operationId: trashTopic
      summary: Move topic to trash
      tags: [topics]
      x-anx-surface: canonical
      x-anx-command-id: topics.trash
      x-anx-cli-path: topics trash
      x-anx-why: Move topic to trash with an explicit operator reason.
      x-anx-input-mode: json-body
      x-anx-streaming: { mode: none }
      x-anx-output-envelope: "Returns `{ topic }`."
      x-anx-error-codes: [auth_required, invalid_request, invalid_token, not_found, conflict]
      x-anx-concepts: [topics, write]
      x-anx-stability: beta
      parameters:
        - $ref: '#/components/parameters/TopicID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TopicTrashRequest'
      responses:
        '200':
          description: Topic moved to trash
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TopicResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'
        '409':
          $ref: '#/components/responses/ErrorResponse'

  /topics/{topic_id}/restore:
    post:
      operationId: restoreTopic
      summary: Restore topic from trash
      tags: [topics]
      x-anx-surface: canonical
      x-anx-command-id: topics.restore
      x-anx-cli-path: topics restore
      x-anx-why: Clear trash lifecycle fields on a topic after an explicit restore action.
      x-anx-input-mode: json-body
      x-anx-streaming: { mode: none }
      x-anx-output-envelope: "Returns `{ topic }`."
      x-anx-error-codes: [auth_required, invalid_request, invalid_token, not_found, conflict]
      x-anx-concepts: [topics, write]
      x-anx-stability: beta
      parameters:
        - $ref: '#/components/parameters/TopicID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TopicLifecycleMutationRequest'
      responses:
        '200':
          description: Topic restored
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TopicResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'
        '409':
          $ref: '#/components/responses/ErrorResponse'

  /ref-edges:
    get:
      operationId: listRefEdges
      summary: List ref edges (forward or reverse indexed lookup)
      tags: [refs]
      x-anx-surface: diagnostic
      x-anx-command-id: ref_edges.list
      x-anx-cli-path: ref-edges list
      x-anx-why: Query the write-through ref index by source or target typed ref (mutually exclusive); reverse lookup uses target_ref.
      x-anx-input-mode: query
      x-anx-streaming: { mode: none }
      x-anx-output-envelope: "Returns `{ ref_edges }`."
      x-anx-error-codes: [auth_required, invalid_request, invalid_token]
      x-anx-concepts: [refs, inspection]
      x-anx-stability: beta
      parameters:
        - name: source_ref
          in: query
          required: false
          description: Typed ref for forward lookup (e.g. "board:abc123"). Mutually exclusive with target_ref.
          schema: { type: string }
        - name: target_ref
          in: query
          required: false
          description: Typed ref for reverse lookup (e.g. "thread:def456"). Mutually exclusive with source_ref.
          schema: { type: string }
        - name: relation
          in: query
          required: false
          description: When set, filter results to this relation type.
          schema: { type: string }
      responses:
        '200':
          description: Ref edge rows
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefEdgesResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'

  /threads:
    get:
      operationId: listThreads
      summary: List backing threads
      tags: [threads]
      x-anx-surface: diagnostic
      x-anx-command-id: threads.list
      x-anx-cli-path: threads list
      x-anx-why: Inspect backing infrastructure threads without making them the primary planning noun.
      x-anx-input-mode: none
      x-anx-streaming: { mode: none }
      x-anx-output-envelope: "Returns `{ threads }`."
      x-anx-error-codes: [auth_required, invalid_token]
      x-anx-concepts: [threads, inspection]
      x-anx-stability: beta
      responses:
        '200':
          description: Thread list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ThreadsResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'

  /threads/{thread_id}:
    get:
      operationId: getThread
      summary: Inspect backing thread
      tags: [threads]
      x-anx-surface: diagnostic
      x-anx-command-id: threads.inspect
      x-anx-cli-path: threads inspect
      x-anx-why: Resolve one backing thread for low-level inspection and diagnostics.
      x-anx-input-mode: none
      x-anx-streaming: { mode: none }
      x-anx-output-envelope: "Returns `{ thread }`."
      x-anx-error-codes: [auth_required, invalid_token, not_found]
      x-anx-concepts: [threads, inspection]
      x-anx-stability: beta
      parameters:
        - $ref: '#/components/parameters/ThreadID'
      responses:
        '200':
          description: Thread payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ThreadResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'

  /threads/{thread_id}/timeline:
    get:
      operationId: getThreadTimeline
      summary: Get backing thread timeline
      tags: [threads]
      x-anx-surface: projection
      x-anx-command-id: threads.timeline
      x-anx-cli-path: threads timeline
      x-anx-why: Retrieve event history plus typed-ref expansions for one backing thread.
      x-anx-input-mode: none
      x-anx-streaming: { mode: none }
      x-anx-output-envelope: "Returns `{ thread, events, artifacts, topics, cards, documents }`."
      x-anx-error-codes: [auth_required, invalid_token, not_found]
      x-anx-concepts: [threads, timeline]
      x-anx-stability: beta
      parameters:
        - $ref: '#/components/parameters/ThreadID'
      responses:
        '200':
          description: Thread timeline payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ThreadTimelineResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'

  /threads/{thread_id}/context:
    get:
      operationId: getThreadContext
      summary: Get backing thread coordination context
      tags: [threads]
      x-anx-surface: projection
      x-anx-command-id: threads.context
      x-anx-cli-path: threads context
      x-anx-why: Load a compact coordination bundle (thread, recent events, key artifacts, cards, documents) for inspection and triage.
      x-anx-input-mode: none
      x-anx-streaming: { mode: none }
      x-anx-output-envelope: "Returns `{ thread, recent_events, key_artifacts, open_cards, documents }` plus forward-compatible fields."
      x-anx-error-codes: [auth_required, invalid_request, invalid_token, not_found]
      x-anx-concepts: [threads, inspection]
      x-anx-stability: beta
      parameters:
        - $ref: '#/components/parameters/ThreadID'
        - name: max_events
          in: query
          required: false
          description: Cap on recent timeline events included (non-negative integer).
          schema:
            type: integer
            minimum: 0
        - name: include_artifact_content
          in: query
          required: false
          description: When true, include short text previews for key artifacts where content is available.
          schema:
            type: boolean
      responses:
        '200':
          description: Thread context bundle
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ThreadContextResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'

  /threads/{thread_id}/workspace:
    get:
      operationId: getThreadWorkspace
      summary: Get backing thread workspace projection (diagnostic)
      tags: [threads]
      x-anx-surface: projection
      x-anx-command-id: threads.workspace
      x-anx-cli-path: threads workspace
      x-anx-why: Read-only diagnostic projection that bundles context, inbox, and related-thread signals for one backing thread. Prefer topics.workspace for normal operator coordination when a topic exists.
      x-anx-input-mode: none
      x-anx-streaming: { mode: none }
      x-anx-output-envelope: "Returns `{ thread, related_topics, cards, documents, board_memberships, inbox, projection_freshness }`."
      x-anx-error-codes: [auth_required, invalid_token, not_found]
      x-anx-concepts: [threads, workspace]
      x-anx-stability: beta
      parameters:
        - $ref: '#/components/parameters/ThreadID'
      responses:
        '200':
          description: Thread workspace payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ThreadWorkspaceResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'

  /docs:
    get:
      operationId: listDocuments
      summary: List documents
      tags: [docs]
      x-anx-surface: canonical
      x-anx-command-id: docs.list
      x-anx-cli-path: docs list
      x-anx-why: Scan canonical document lineages.
      x-anx-input-mode: none
      x-anx-streaming: { mode: none }
      x-anx-output-envelope: "Returns `{ documents }`."
      x-anx-error-codes: [auth_required, invalid_request, invalid_token]
      x-anx-concepts: [docs]
      x-anx-stability: beta
      parameters:
        - name: q
          in: query
          required: false
          schema: { type: string }
          description: Search documents by id or title substring.
        - name: thread_id
          in: query
          required: false
          schema: { type: string }
          description: Restrict results to documents bound to this thread id.
        - name: cursor
          in: query
          required: false
          schema: { type: string }
          description: Opaque pagination cursor from a previous list response.
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 1000
          description: Page size; omit to return the full matching set.
        - name: include_trashed
          in: query
          required: false
          schema: { type: boolean, default: false }
          description: Include trashed documents (ignored when state is set).
        - name: trashed_only
          in: query
          required: false
          schema: { type: boolean, default: false }
          description: Return only trashed documents (ignored when state is set).
        - name: include_archived
          in: query
          required: false
          schema: { type: boolean, default: false }
          description: Include archived documents (ignored when state is set).
        - name: archived_only
          in: query
          required: false
          schema: { type: boolean, default: false }
          description: Return only archived documents (ignored when state is set).
