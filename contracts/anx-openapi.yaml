        document_ref: { $ref: '#/components/schemas/TypedRef' }
        title: { type: string }
        summary: { type: string }
        column_key:
          type: string
          enum: [backlog, ready, in_progress, blocked, review, done]
        before_card_id:
          type: string
          description: Optional neighbor card id for initial ordering within column_key.
        after_card_id:
          type: string
