        summary: { type: string }
        assignee_refs:
          type: array
          items: { $ref: '#/components/schemas/TypedRef' }
        risk:
          type: string
          enum: [low, medium, high, critical]
        resolution:
          type: string
          nullable: true
          enum: [done, canceled]
        resolution_refs:
          type: array
          items: { $ref: '#/components/schemas/TypedRef' }
        related_refs:
          type: array
          items: { $ref: '#/components/schemas/TypedRef' }
        due_at:
          type: string
          format: date-time
          nullable: true
        definition_of_done:
          type: array
          items: { type: string }
        provenance: { $ref: '#/components/schemas/Provenance' }

    MoveCardInput:
      type: object
      properties:
        column_key:
          type: string
          enum: [backlog, ready, in_progress, blocked, review, done]
        before_card_id:
          type: string
          description: Insert immediately before this card id in column_key; mutually exclusive with after_card_id.
        after_card_id:
          type: string
          description: Insert immediately after this card id in column_key; mutually exclusive with before_card_id.
        resolution:
          type: string
          enum: [done, canceled]
        resolution_refs:
          type: array
          items: { $ref: '#/components/schemas/TypedRef' }
