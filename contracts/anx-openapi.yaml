        outputs:
          type: array
          items: { $ref: '#/components/schemas/TypedRef' }
        verification_evidence:
          type: array
          items: { $ref: '#/components/schemas/TypedRef' }
        changes_summary: { type: string }
        known_gaps:
          type: array
          items: { type: string }
      required:
        [receipt_id, subject_ref, outputs, verification_evidence, changes_summary, known_gaps]

    ReviewPacket:
      type: object
      properties:
        review_id: { type: string }
